<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloAds AI | مولد الإعلانات الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold text-center mb-2 gradient-text">VeloAds AI</h1>
        <p class="text-slate-400 text-center mb-8 text-sm">حول رابط منتجك إلى فيديو إعلاني في ثوانٍ</p>

        <div class="space-y-4">
            <div>
                <label class="block text-sm mb-2">رابط المنتج (أمازون، نون، إلخ)</label>
                <input type="url" id="productUrl" placeholder="https://amazon.sa/..." 
                       class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 focus:border-blue-500 outline-none transition">
            </div>

            <button onclick="generateAd()" id="btnText"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition transform active:scale-95">
                توليد الفيديو الذكي ✨
            </button>
        </div>

        <div id="statusArea" class="mt-6 hidden">
            <div class="p-4 bg-slate-900 rounded-lg border border-blue-500/30">
                <p id="statusText" class="text-sm text-blue-400 animate-pulse">جاري سحب البيانات والتحليل...</p>
                <div id="resultScript" class="mt-3 text-xs text-slate-300 italic"></div>
            </div>
        </div>
    </div>

    <script>
        async function generateAd() {
            const url = document.getElementById('productUrl').value;
            if(!url) return alert('يا عامر، حط الرابط أولاً!');

            document.getElementById('statusArea').classList.remove('hidden');
            document.getElementById('btnText').disabled = true;
            document.getElementById('btnText').innerText = "جاري العمل...";

            // هنا نربط الواجهة بالسيرفر اللي سويناه (Backend)
            try {
                const response = await fetch('https://veloads-pro.onrender.com/api/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ product_name: url })
                });
                const data = await response.json();
                document.getElementById('statusText').innerText = "تم البدء! جاري تصوير الفيديو...";
                document.getElementById('resultScript').innerText = "السيناريو: " + data.ad_script;
            } catch (err) {
                document.getElementById('statusText').innerText = "تأكد من تشغيل السيرفر أولاً!";
                document.getElementById('btnText').disabled = false;
            }
        }
    </script>
</body>
</html>
